<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>初序 · 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: linear-gradient(165deg, #1A2E25 0%, #1f3d2e 50%, #243a2d 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 28px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #2D8B55, #C6983A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-sub {
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 32px;
        }

        .tabs {
            display: flex;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
            border: none;
            background: none;
            font-family: inherit;
        }

        .tab.active {
            background: rgba(45, 139, 85, 0.3);
            color: #fff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #2D8B55;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2D8B55, #C6983A);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .msg {
            text-align: center;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        .msg.error {
            color: #E57373;
        }

        .msg.success {
            color: #81C784;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo">初序</div>
        <div class="login-sub">读懂身体说的话</div>

        <div class="tabs">
            <button class="tab active" id="tab-login" onclick="switchTab('login')">登录</button>
            <button class="tab" id="tab-signup" onclick="switchTab('signup')">注册</button>
        </div>

        <form id="auth-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="input-email" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="input-password" placeholder="请输入密码（至少6位）" required minlength="6">
            </div>
            <div class="form-group" id="nickname-group" style="display:none;">
                <label>昵称（选填）</label>
                <input type="text" id="input-nickname" placeholder="给自己起个名字">
            </div>
            <button type="submit" class="btn-submit" id="btn-submit">登录</button>
        </form>

        <div class="msg" id="msg"></div>
        <button
            style="display:block;width:100%;text-align:center;margin-top:16px;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;border:none;background:none;font-family:inherit;"
            onclick="location.href='index.html'">跳过登录，直接测试 →</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        var mode = 'login';
        var sb = null;

        if (typeof supabase !== 'undefined') {
            sb = supabase.createClient(
                'https://byjqjpklizpnulybsrqz.supabase.co',
                'sb_publishable_noGNyOuxTbaMBN0J27diUA_H2yqIX3e'
            );
            sb.auth.getSession().then(function (res) {
                if (res.data.session) {
                    // 已登录，检查 user_profiles
                    sb.from('user_profiles').select('id').eq('user_id', res.data.session.user.id).then(function (r) {
                        if (r.data && r.data.length > 0) {
                            location.href = 'index.html';
                        } else {
                            // Auth 有但 user_profiles 没有，退出登录
                            sb.auth.signOut();
                            showMsg('你的账号未被授权使用，请联系管理员', 'error');
                        }
                    });
                }
            });
        }

        function switchTab(tab) {
            mode = tab;
            document.getElementById('tab-login').className = 'tab' + (tab === 'login' ? ' active' : '');
            document.getElementById('tab-signup').className = 'tab' + (tab === 'signup' ? ' active' : '');
            document.getElementById('btn-submit').textContent = tab === 'login' ? '登录' : '注册';
            document.getElementById('nickname-group').style.display = tab === 'signup' ? 'block' : 'none';
            document.getElementById('msg').textContent = '';
        }

        function showMsg(text, type) {
            var el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        function handleSubmit(e) {
            e.preventDefault();
            if (!sb) { showMsg('服务连接中，请稍后', 'error'); return; }

            var email = document.getElementById('input-email').value.trim();
            var password = document.getElementById('input-password').value;
            var btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = '处理中...';

            if (mode === 'login') {
                sb.auth.signInWithPassword({ email: email, password: password })
                    .then(function (res) {
                        if (res.error) throw res.error;
                        // 双检查：Auth 通过后检查 user_profiles
                        return sb.from('user_profiles').select('id').eq('user_id', res.data.user.id).then(function (r) {
                            if (!r.data || r.data.length === 0) {
                                sb.auth.signOut();
                                throw { message: '你的账号未被授权，请联系管理员开通' };
                            }
                            localStorage.removeItem('chuxu_checkins');
                            showMsg('登录成功！正在跳转...', 'success');
                            setTimeout(function () { location.href = 'index.html'; }, 600);
                        });
                    })
                    .catch(function (err) {
                        showMsg(err.message === 'Invalid login credentials' ? '邮箱或密码错误' : err.message, 'error');
                        btn.disabled = false;
                        btn.textContent = '登录';
                    });
            } else {
                var nickname = document.getElementById('input-nickname').value.trim();
                sb.auth.signUp({ email: email, password: password })
                    .then(function (res) {
                        if (res.error) throw res.error;
                        var user = res.data.user;
                        if (user) {
                            // 写入 user_profiles（待审批状态）
                            return sb.from('user_profiles').insert({
                                user_id: user.id,
                                email: email,
                                nickname: nickname || email.split('@')[0],
                                role: 'pending',
                                note: '待管理员审批'
                            }).then(function (ir) {
                                if (ir.error) console.log('profile insert error:', ir.error.message);
                                showMsg('注册成功！请等待管理员审批后登录', 'success');
                            });
                        }
                        btn.disabled = false;
                        btn.textContent = '注册';
                    })
                    .catch(function (err) {
                        showMsg(err.message, 'error');
                        btn.disabled = false;
                        btn.textContent = '注册';
                    });
            }
        }
    </script>
</body>

</html>
